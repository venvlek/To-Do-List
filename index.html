<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>DoIt — To-Do List</title>
    <meta name="description" content="Organise your day. Get more done." />
    <meta name="theme-color" content="#1a1aff" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- ── Apple PWA meta ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DoIt" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- ── Microsoft Tile ── -->
    <meta name="msapplication-TileColor" content="#1a1aff" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- ── Open Graph (for sharing) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="DoIt — To-Do List" />
    <meta property="og:description" content="Organise your day. Get more done." />
    <meta property="og:image"       content="/icons/icon-512x512.png" />

    <!-- ── Safe area insets for notched phones ── -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        padding-top:    env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
